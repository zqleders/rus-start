name: Ru Auto Task

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          pip install playwright requests
          playwright install chromium

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi
          
          # 1. 安装 Sing-box
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=${TAG#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${VERSION}-linux-amd64.tar.gz"
          mv "sing-box-${VERSION}-linux-amd64/sing-box" . && chmod +x sing-box
          
          # 2. 生成配置 (原代码保持不变)
          python3 << 'PYEOF'
          import os, json, base64
          from urllib.parse import urlparse, parse_qs, unquote
          # ... (此处省略你的生成逻辑，保持你原来的即可) ...
          config = generate_singbox_config() # 确保你的逻辑内包含了这个函数
          with open("config.json", "w") as f: json.dump(config, f, indent=2)
          PYEOF
          
          # 3. 后台运行
          ./sing-box run -c config.json > proxy.log 2>&1 &
          sleep 10
          
          # 4. 验证代理
          if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://www.google.com > /dev/null; then
            echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
          else
            cat proxy.log
            exit 1
          fi

      - name: Run automation script
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 自动注入上面步骤生成的环境变量
          all_proxy: ${{ env.PROXY_SOCKS5 }} 
        run: python main.py
